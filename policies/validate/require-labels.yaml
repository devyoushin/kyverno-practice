apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-app-label
  annotations:
    policies.kyverno.io/title: Require App Label
    policies.kyverno.io/description: >-
      모든 Pod에 'app' 레이블이 있어야 합니다.
      레이블 없이 생성된 Pod는 관찰성(Observability) 및 네트워크 정책 적용이 어렵습니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-app-label
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - kyverno
              - kube-public
      validate:
        message: "Pod에는 반드시 'app' 레이블이 있어야 합니다. 예: app: my-service"
        pattern:
          metadata:
            labels:
              app: "?*"
