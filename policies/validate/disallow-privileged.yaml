apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/description: >-
      privileged 모드로 실행되는 컨테이너를 금지합니다.
      privileged 컨테이너는 호스트 커널에 직접 접근할 수 있어 보안 위협이 됩니다.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privileged
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - kyverno
      validate:
        message: "privileged 컨테이너는 허용되지 않습니다."
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): "false | null"
            =(initContainers):
              - =(securityContext):
                  =(privileged): "false | null"
